name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, closed ]

env:
  AWS_REGION: ap-northeast-2
  # ECR 리포지토리 이름 - 프로젝트별로 변경 가능
  ECR_REPOSITORY_NAME: techwikiplus/server/user-service
  PROJECT_DIRECTORY: techwikiplus-server
  # 헬스체크 설정
  HEALTH_CHECK_URL: http://localhost:9000/actuator/health
  HEALTH_CHECK_MAX_RETRIES: 10
  HEALTH_CHECK_RETRY_DELAY: 5

jobs:
  lint:
    name: 코드 스타일 검사
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JDK 21 설정
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Gradle 캐시 설정
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: 코드 스타일 검사 (ktlint)
      run: ./gradlew ktlintCheck

  test:
    name: 테스트 실행
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JDK 21 설정
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Gradle 캐시 설정
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: 테스트 실행
      run: ./gradlew test

    - name: 테스트 리포트 업로드
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: service/user/build/reports/tests/

  build:
    name: 빌드
    needs: [lint, test]
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JDK 21 설정
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Gradle 캐시 설정
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: 애플리케이션 빌드
      run: ./gradlew :service:user:build -x test

    - name: JAR 파일 업로드
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: service/user/build/libs/*.jar
        retention-days: 1

  docker-build:
    name: Docker 이미지 빌드
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    environment: AWS
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JAR 파일 다운로드
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: service/user/build/libs/

    - name: AWS 자격 증명 구성
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Amazon ECR 로그인
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Docker Buildx 설정
      uses: docker/setup-buildx-action@v3

    - name: Docker 메타데이터 생성
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{date 'YYYYMMDD'}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Docker 이미지 빌드 및 ECR 푸시
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./service/user/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          DOCKER_BUILDKIT=1

  deploy-staging:
    name: 스테이징 배포
    needs: docker-build
    if: github.ref == 'refs/heads/develop' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true))
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: 스테이징 서버로 배포
      run: |
        echo "🚀 스테이징 환경 배포 시작"
        echo "이미지: ${{ needs.docker-build.outputs.image-tag }}"
        # TODO: 스테이징 배포 로직 추가

  deploy-production:
    name: 프로덕션 배포
    needs: docker-build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true))
    runs-on: ubuntu-latest
    environment: AWS

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: SSH 키 설정
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: EC2로 docker-compose.yml 전송
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "mkdir -p ~/${{ env.PROJECT_DIRECTORY }}"
        scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/${{ env.PROJECT_DIRECTORY }}/

    - name: EC2에서 Docker Compose 실행
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
          # Docker Compose 실행 디렉토리로 이동
          cd ~/${{ env.PROJECT_DIRECTORY }}
          
          # Docker 및 Docker Compose 버전 확인
          echo "===== Docker 환경 확인 ====="
          docker --version
          docker-compose --version
          
          # 현재 디렉토리와 파일 확인
          echo "\n===== 현재 디렉토리 확인 ====="
          pwd
          ls -la
          
          # docker-compose.yml 파일 확인
          if [ ! -f docker-compose.yml ]; then
            echo "ERROR: docker-compose.yml 파일이 없습니다!"
            exit 1
          fi

          # 최신 이미지 태그로 환경변수 업데이트
          # .env 파일에서 USER_SERVICE_IMAGE 라인만 업데이트
          IMAGE_TAG="${{ needs.docker-build.outputs.image-tag }}"
          # 첫 번째 태그만 추출 (latest가 아닌 실제 태그)
          FIRST_TAG=$(echo "$IMAGE_TAG" | tr ',' '\n' | grep -v 'latest' | head -1 | xargs)

          if [ -n "$FIRST_TAG" ]; then
            echo "새 이미지 태그: $FIRST_TAG"
            # .env 파일의 USER_SERVICE_IMAGE 업데이트
            if [ -f .env ]; then
              sed -i.bak "s|^USER_SERVICE_IMAGE=.*|USER_SERVICE_IMAGE=$FIRST_TAG|" .env
              echo "USER_SERVICE_IMAGE 업데이트 완료"
            else
              echo ".env 파일이 없습니다. EC2에 .env 파일을 생성해주세요."
              exit 1
            fi
          fi

          # 기존 컨테이너 정지 및 제거
          echo "기존 컨테이너 정지 중..."
          docker-compose down || true

          # ECR 로그인
          echo "ECR 로그인 중..."
          # 이미지 태그에서 ECR 레지스트리 URL 추출
          ECR_REGISTRY=$(echo "$FIRST_TAG" | cut -d'/' -f1)
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY || {
            echo "ERROR: ECR 로그인 실패. EC2 IAM 역할을 확인하세요."
            echo "IAM 역할에 AmazonEC2ContainerRegistryReadOnly 권한이 필요합니다."
            exit 1
          }

          # 새 이미지로 컨테이너 시작
          echo "새 컨테이너 시작 중..."
          echo "Docker Compose 명령: docker-compose up -d"
          
          # 환경변수 확인
          echo "\n===== 환경변수 확인 ====="
          echo "USER_SERVICE_IMAGE: $(grep USER_SERVICE_IMAGE .env | cut -d'=' -f2)"
          
          docker-compose up -d || {
            echo "ERROR: Docker Compose 시작 실패"
            echo "\n===== Docker Compose 에러 로그 ====="
            docker-compose logs
            echo "\n===== Docker 이벤트 ====="
            docker events --since 5m --until now
            exit 1
          }

          # 서비스 시작 대기
          echo "서비스 시작 대기 중..."
          sleep 30

          # 서비스 상태 확인
          echo "===== 실행 중인 컨테이너 확인 ====="
          docker ps
          
          echo "\n===== Docker Compose 상태 ====="
          docker-compose ps
          
          # 컨테이너가 실행 중인지 확인
          RUNNING_CONTAINERS=$(docker-compose ps -q | wc -l)
          if [ "$RUNNING_CONTAINERS" -eq "0" ]; then
            echo "ERROR: 실행 중인 컨테이너가 없습니다!"
            echo "\n===== Docker Compose 로그 ====="
            docker-compose logs
            exit 1
          fi

          # 로그 확인 (마지막 100줄)
          echo "\n===== 서비스 로그 (최근 100줄) ====="
          docker-compose logs --tail=100 user-service || echo "로그를 가져올 수 없습니다."

          # 헬스체크
          echo "\n===== 헬스체크 ====="
          echo "헬스체크 URL: ${{ env.HEALTH_CHECK_URL }}"
          MAX_RETRIES=${{ env.HEALTH_CHECK_MAX_RETRIES }}
          RETRY_DELAY=${{ env.HEALTH_CHECK_RETRY_DELAY }}
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f ${{ env.HEALTH_CHECK_URL }} 2>/dev/null; then
              echo "\n✅ 헬스체크 성공!"
              break
            else
              echo "헬스체크 실패... 재시도 중 ($((RETRY_COUNT+1))/$MAX_RETRIES)"
              sleep $RETRY_DELAY
              RETRY_COUNT=$((RETRY_COUNT+1))
            fi
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "\nWARNING: 헬스체크가 계속 실패합니다. 서비스 로그를 확인하세요."
            echo "시도한 URL: ${{ env.HEALTH_CHECK_URL }}"
          fi

          # 오래된 이미지 정리
          echo "\n오래된 이미지 정리 중..."
          docker image prune -af --filter "until=24h" || true

          # 최종 상태 확인
          echo "\n===== 최종 배포 상태 ====="
          docker ps --filter "name=techwikiplus"
          
          # 실제로 user-service가 실행 중인지 확인
          if docker ps | grep -q "user-service"; then
            echo "\n✅ 배포가 성공적으로 완료되었습니다!"
          else
            echo "\n❌ ERROR: user-service 컨테이너가 실행되지 않았습니다!"
            exit 1
          fi
        ENDSSH

    - name: 배포 성공 알림
      if: success()
      run: |
        echo "✅ 프로덕션 배포가 성공적으로 완료되었습니다!"
        echo "이미지: ${{ needs.docker-build.outputs.image-tag }}"
        echo "환경: Production (main branch)"
        echo "시간: $(date)"

    - name: 배포 실패 알림
      if: failure()
      run: |
        echo "❌ 프로덕션 배포가 실패했습니다!"
        echo "브랜치: ${{ github.ref }}"
        echo "커밋: ${{ github.sha }}"
        exit 1
name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, closed ]

env:
  AWS_REGION: ap-northeast-2
  # ECR 리포지토리 이름 - 프로젝트별로 변경 가능
  ECR_REPOSITORY_NAME: techwikiplus/server/user-service
  PROJECT_DIRECTORY: techwikiplus-server

jobs:
  lint:
    name: 코드 스타일 검사
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JDK 21 설정
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Gradle 캐시 설정
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: 코드 스타일 검사 (ktlint)
      run: ./gradlew ktlintCheck

  test:
    name: 테스트 실행
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JDK 21 설정
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Gradle 캐시 설정
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: 테스트 실행
      run: ./gradlew test

    - name: 테스트 리포트 업로드
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: service/user/build/reports/tests/

  build:
    name: 빌드
    needs: [lint, test]
    runs-on: ubuntu-latest
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JDK 21 설정
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Gradle 캐시 설정
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Gradle 실행 권한 부여
      run: chmod +x gradlew

    - name: 애플리케이션 빌드
      run: ./gradlew :service:user:build -x test

    - name: JAR 파일 업로드
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: service/user/build/libs/*.jar
        retention-days: 1

  docker-build:
    name: Docker 이미지 빌드
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    environment: AWS
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: JAR 파일 다운로드
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: service/user/build/libs/

    - name: AWS 자격 증명 구성
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Amazon ECR 로그인
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Docker Buildx 설정
      uses: docker/setup-buildx-action@v3

    - name: Docker 메타데이터 생성
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{date 'YYYYMMDD'}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Docker 이미지 빌드 및 ECR 푸시
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./service/user/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          DOCKER_BUILDKIT=1

  deploy-staging:
    name: 스테이징 배포
    needs: docker-build
    if: github.ref == 'refs/heads/develop' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true))
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: 스테이징 서버로 배포
      run: |
        echo "🚀 스테이징 환경 배포 시작"
        echo "이미지: ${{ needs.docker-build.outputs.image-tag }}"
        # TODO: 스테이징 배포 로직 추가

  deploy-production:
    name: 프로덕션 배포
    needs: docker-build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true))
    runs-on: ubuntu-latest
    environment: AWS

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: SSH 키 설정
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: EC2로 docker-compose.yml 전송
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "mkdir -p ~/${{ env.PROJECT_DIRECTORY }}"
        scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/${{ env.PROJECT_DIRECTORY }}/

    - name: EC2에서 Docker Compose 실행
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
          # Docker Compose 실행 디렉토리로 이동
          cd ~/${{ env.PROJECT_DIRECTORY }}

          # 최신 이미지 태그로 환경변수 업데이트
          # .env 파일에서 USER_SERVICE_IMAGE 라인만 업데이트
          IMAGE_TAG="${{ needs.docker-build.outputs.image-tag }}"
          # 첫 번째 태그만 추출 (latest가 아닌 실제 태그)
          FIRST_TAG=$(echo "$IMAGE_TAG" | tr ',' '\n' | grep -v 'latest' | head -1 | xargs)

          if [ -n "$FIRST_TAG" ]; then
            echo "새 이미지 태그: $FIRST_TAG"
            # .env 파일의 USER_SERVICE_IMAGE 업데이트
            if [ -f .env ]; then
              sed -i.bak "s|^USER_SERVICE_IMAGE=.*|USER_SERVICE_IMAGE=$FIRST_TAG|" .env
              echo "USER_SERVICE_IMAGE 업데이트 완료"
            else
              echo ".env 파일이 없습니다. EC2에 .env 파일을 생성해주세요."
              exit 1
            fi
          fi

          # 기존 컨테이너 정지 및 제거
          docker-compose down || true

          # 새 이미지로 컨테이너 시작
          docker-compose up -d

          # 서비스 시작 대기
          echo "서비스 시작 대기 중..."
          sleep 30

          # 서비스 상태 확인
          docker-compose ps

          # 로그 확인 (마지막 50줄)
          docker-compose logs --tail=50 user-service

          # 헬스체크 (옵션)
          curl -f http://localhost:9000/actuator/health || echo "헬스체크 엔드포인트가 없거나 아직 준비되지 않았습니다."

          # 오래된 이미지 정리
          docker image prune -af --filter "until=24h"

          echo "배포가 완료되었습니다!"
        ENDSSH

    - name: 배포 성공 알림
      if: success()
      run: |
        echo "✅ 프로덕션 배포가 성공적으로 완료되었습니다!"
        echo "이미지: ${{ needs.docker-build.outputs.image-tag }}"
        echo "환경: Production (main branch)"
        echo "시간: $(date)"

    - name: 배포 실패 알림
      if: failure()
      run: |
        echo "❌ 프로덕션 배포가 실패했습니다!"
        echo "브랜치: ${{ github.ref }}"
        echo "커밋: ${{ github.sha }}"
        exit 1
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 라이트 모드 (기본값) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }

        .header {
            background-color: #f8f9fa;
            padding: 40px 30px;
            border-bottom: 1px solid #e5e7eb;
        }

        .logo {
            color: #1a1a1a;
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-plus {
            color: #6b7280;
            font-weight: 300;
        }

        .content {
            background-color: #ffffff;
            padding: 40px 30px;
            border: 1px solid #e5e7eb;
            border-top: none;
        }

        h2 {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 24px 0;
        }

        p {
            color: #4b5563;
            margin: 16px 0;
            font-size: 16px;
        }

        .greeting {
            color: #1a1a1a;
            font-size: 16px;
        }

        .code-container {
            background-color: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 32px;
            margin: 32px 0;
            text-align: center;
        }

        .code-label {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .code {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 32px;
            font-weight: 500;
            color: #1a1a1a;
            letter-spacing: 6px;
            margin: 0;
            user-select: all;
        }

        .validity-notice {
            color: #6b7280;
            font-size: 14px;
            margin: 20px 0;
            text-align: center;
        }

        .security-warning {
            color: #6b7280;
            font-size: 14px;
            margin: 24px 0;
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            border-bottom: 1px solid #e5e7eb;
        }

        .security-notice {
            color: #6b7280;
            font-size: 14px;
            margin-top: 24px;
        }

        .footer {
            background-color: #f9fafb;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #e5e7eb;
        }

        .footer p {
            color: #9ca3af;
            font-size: 12px;
            margin: 0;
        }

        .divider {
            height: 1px;
            background-color: #e5e7eb;
            margin: 32px 0;
        }

        /* 다크 모드 */
        @media (prefers-color-scheme: dark) {
            body {
                color: #d4d4d4;
                background-color: #0a0a0a;
            }

            .container {
                background-color: #0a0a0a;
            }

            .header {
                background-color: #1e1e1e;
                border-bottom-color: #2d2d2d;
            }

            .logo {
                color: #e5e5e5;
            }


            .content {
                background-color: #141414;
                border-color: #2d2d2d;
            }

            h2 {
                color: #e5e5e5;
            }

            p {
                color: #a1a1a1;
            }

            .greeting {
                color: #d4d4d4;
            }

            .code-container {
                background-color: #1e1e1e;
                border-color: #2d2d2d;
            }

            .code-label {
                color: #7c7c7c;
            }

            .code {
                color: #d4d4d4;
            }

            .validity-notice {
                color: #7c7c7c;
            }

            .security-warning {
                color: #7c7c7c;
                border-top-color: #2d2d2d;
                border-bottom-color: #2d2d2d;
            }

            .security-notice {
                color: #7c7c7c;
            }

            .footer {
                background-color: #0a0a0a;
                border-top-color: #2d2d2d;
            }

            .footer p {
                color: #6b6b6b;
            }

            .divider {
                background-color: #2d2d2d;
            }
        }

        @media only screen and (max-width: 600px) {
            .header, .content {
                padding: 30px 20px;
            }
            .code {
                font-size: 28px;
                letter-spacing: 6px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="logo">
            TechWiki<span class="logo-plus">+</span>
        </h1>
    </div>
    <div class="content">
        <h2>비밀번호 재설정</h2>
        <p class="greeting">안녕하세요,</p>
        <p>귀하의 TechWiki+ 계정에 대한 비밀번호 재설정이 요청되었습니다. 아래 인증 코드를 사용하여 새로운 비밀번호를 설정해 주세요.</p>

        <div class="code-container">
            <div class="code-label">비밀번호 재설정 코드</div>
            <div class="code" th:text="${code}"></div>
        </div>

        <p class="validity-notice">이 코드는 10분간 유효합니다.</p>

        <div class="security-warning">
            <p>본인이 요청하지 않으셨다면 계정 보안을 위해 비밀번호를 변경해 주세요.</p>
        </div>

        <div class="divider"></div>

        <p class="security-notice">
            이 이메일은 TechWiki+ 비밀번호 재설정 요청에 따라 자동으로 발송되었습니다.<br>
            문의사항이 있으시면 고객 지원팀에 연락해 주세요.
        </p>
    </div>
    <div class="footer">
        <p>© 2024 TechWiki+. All rights reserved.</p>
    </div>
</div>
</body>
</html>

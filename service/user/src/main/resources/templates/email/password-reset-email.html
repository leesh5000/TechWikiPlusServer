<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #E74C3C; color: white; padding: 20px; text-align: center; }
        .content { background-color: #f4f4f4; padding: 30px; }
        .code-box { background-color: white; padding: 20px; text-align: center; margin: 20px 0; border-radius: 5px; }
        .code { font-size: 32px; font-weight: bold; color: #E74C3C; letter-spacing: 5px; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TechWiki+</h1>
        </div>
        <div class="content">
            <h2>비밀번호 재설정</h2>
            <p>안녕하세요,</p>
            <p>비밀번호 재설정을 위한 인증 코드입니다:</p>
            <div class="code-box">
                <div class="code" th:text="${code}"></div>
            </div>
            <p>이 코드는 10분간 유효합니다.</p>
            <p>본인이 요청하지 않으셨다면 계정 보안을 위해 비밀번호를 변경해 주세요.</p>
        </div>
        <div class="footer">
            <p>© 2024 TechWiki+. All rights reserved.</p>
        </div>
    </div>
</body>
</html>

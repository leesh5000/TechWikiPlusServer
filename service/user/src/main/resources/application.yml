server:
  port: 9000
spring:
  application:
    name: techwikiplus-user-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:13306/techwikiplus?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&useServerPrepStmts=true
    username: techwikiplus
    password: techwikipassword
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 16379
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@techwikiplus.com}
    password: ${MAIL_PASSWORD:techwikiplus}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          timeout: 5000

jwt:
  secret: ${JWT_SECRET:techwikiplus-jwt-secret-key-for-authentication-2024}
  access-token-expiration: 3600000   # 1 hour
  refresh-token-expiration: 604800000 # 7 days
